<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geolocation & Multiple IPs</title>
  </head>
  <body>
    <h1>ตำแหน่งของคุณ</h1>
    <button onclick="getLocation()">ดึงข้อมูล</button>
    <p id="output">คลิกปุ่มเพื่อดึงข้อมูล</p>

    <script>
      // ดึง Public IPv4
      async function getIPv4() {
        try {
          let response = await fetch("https://api.ipify.org?format=json");
          let data = await response.json();
          return data.ip;
        } catch (error) {
          return "ดึง IPv4 ไม่ได้";
        }
      }

      // ดึง Public IPv6
      async function getIPv6() {
        try {
          let response = await fetch("https://api64.ipify.org?format=json");
          let data = await response.json();
          return data.ip;
        } catch (error) {
          return "ดึง IPv6 ไม่ได้";
        }
      }

      // ดึง Local IP (LAN)
      function getLocalIP(callback) {
        let pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel("");
        pc.createOffer()
          .then((offer) => pc.setLocalDescription(offer))
          .catch(() => {});
        pc.onicecandidate = (event) => {
          if (event && event.candidate && event.candidate.candidate) {
            let ipMatch = event.candidate.candidate.match(
              /([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})/
            );
            let localIP = ipMatch ? ipMatch[1] : "ดึง Local IP ไม่ได้";
            callback(localIP);
            pc.close();
          }
        };
      }

      // ดึงพิกัด + IPs
      async function getLocation() {
        let ipv4 = await getIPv4();
        let ipv6 = await getIPv6();

        getLocalIP((localIP) => {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                let lat = position.coords.latitude;
                let lon = position.coords.longitude;

                document.getElementById("output").innerHTML = `
                            🌍 <b>Public IPv4:</b> ${ipv4} <br>
                            🌍 <b>Public IPv6:</b> ${ipv6} <br>
                            🏠 <b>Local IP (LAN):</b> ${localIP} <br>
                            📍 <b>Latitude:</b> ${lat} <br>
                            📍 <b>Longitude:</b> ${lon}
                        `;
              },
              (error) => {
                document.getElementById("output").innerHTML =
                  "Error: " + error.message;
              }
            );
          } else {
            document.getElementById("output").innerHTML =
              "Geolocation ไม่รองรับในเบราว์เซอร์นี้";
          }
        });
      }
    </script>
  </body>
</html>
