<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiple IP Fetcher</title>
  </head>
  <body>
    <h1>ดึง IP หลายประเภท</h1>
    <button onclick="getIPs()">ดึง IP</button>
    <p id="output">คลิกปุ่มเพื่อดึง IP</p>

    <script>
      // ดึง Public IPv4
      async function getIPv4() {
        try {
          let response = await fetch("https://api.ipify.org?format=json");
          let data = await response.json();
          return data.ip;
        } catch (error) {
          return "ดึง IPv4 ไม่ได้";
        }
      }

      // ดึง Public IPv6
      async function getIPv6() {
        try {
          let response = await fetch("https://api64.ipify.org?format=json");
          let data = await response.json();
          return data.ip;
        } catch (error) {
          return "ดึง IPv6 ไม่ได้";
        }
      }

      // ดึง Local IP (LAN)
      function getLocalIP(callback) {
        let pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel("");
        pc.createOffer()
          .then((offer) => pc.setLocalDescription(offer))
          .catch(() => {});
        pc.onicecandidate = (event) => {
          if (event && event.candidate && event.candidate.candidate) {
            let ipMatch = event.candidate.candidate.match(
              /([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})/
            );
            let localIP = ipMatch ? ipMatch[1] : "ดึง Local IP ไม่ได้";
            callback(localIP);
            pc.close();
          }
        };
      }

      // ดึง IP ทั้งหมด
      async function getIPs() {
        let ipv4 = await getIPv4();
        let ipv6 = await getIPv6();

        getLocalIP((localIP) => {
          document.getElementById("output").innerHTML = `
                    🌍 <b>Public IPv4:</b> ${ipv4} <br>
                    🌍 <b>Public IPv6:</b> ${ipv6} <br>
                    🏠 <b>Local IP (LAN):</b> ${localIP}
                `;
        });
      }
    </script>
  </body>
</html>
